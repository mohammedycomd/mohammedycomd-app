<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | إدارة البحوث والدراسات</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ===== LOGIN PAGE FULL REDESIGN ===== */
        .login-page {
            height: 100vh;
            display: flex;
            align-items: stretch;
            background: #0f172a;
            overflow: hidden;
            position: relative;
        }

        /* Left Panel - Branding */
        .login-branding {
            flex: 1;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            position: relative;
            overflow: hidden;
        }

        .login-branding::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(197,160,89,0.12) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-glow 4s ease-in-out infinite;
        }

        .login-branding::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.06;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        .brand-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .brand-logo-ring {
            width: 110px;
            height: 110px;
            border: 3px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            position: relative;
            animation: rotate-ring 10s linear infinite;
        }

        .brand-logo-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px dashed rgba(197,160,89,0.3);
            animation: rotate-ring 15s linear infinite reverse;
        }

        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .brand-logo-ring i {
            font-size: 2.5rem;
            color: var(--accent);
            animation: rotate-ring 10s linear infinite reverse; /* counter-rotate icon */
        }

        .brand-title {
            font-size: 1.9rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .brand-subtitle {
            font-size: 1rem;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 2rem;
        }

        .brand-feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
        }

        .brand-feature-item i {
            width: 36px;
            height: 36px;
            background: rgba(197,160,89,0.15);
            border: 1px solid rgba(197,160,89,0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        /* Right Panel - Login Form */
        .login-form-panel {
            width: 520px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 3.5rem;
            position: relative;
            box-shadow: -20px 0 60px rgba(0,0,0,0.4);
        }

        .login-form-panel::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent) 0%, transparent 50%, var(--accent) 100%);
        }

        .form-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px rgba(15,23,42,0.25);
        }

        .form-logo i {
            font-size: 1.8rem;
            color: var(--accent);
        }

        .form-header-title {
            font-size: 2rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.4rem;
            text-align: center;
        }

        .form-header-sub {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .login-form {
            width: 100%;
        }

        .field-group {
            margin-bottom: 1.6rem;
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 0.6rem;
        }

        .field-label i {
            color: var(--accent);
            font-size: 0.85rem;
        }

        .field-input-wrapper {
            position: relative;
        }

        .field-input {
            width: 100%;
            padding: 1.1rem 1.4rem;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
            color: #1e293b;
            transition: all 0.3s ease;
            outline: none;
        }

        .field-input:focus {
            border-color: var(--accent);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(197,160,89,0.12);
        }

        .field-input::placeholder {
            color: #b0bec5;
            font-size: 0.9rem;
        }

        .toggle-password {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            font-size: 1rem;
            transition: color 0.3s;
            padding: 0;
        }

        .toggle-password:hover { color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 1.15rem;
            background: linear-gradient(135deg, #c5a059, #e5c07b);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            box-shadow: 0 8px 20px rgba(197,160,89,0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before { left: 100%; }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(197,160,89,0.45);
        }
        .btn-login:active { transform: translateY(0); }

        .login-security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 2rem;
            padding: 0.8rem 1.5rem;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            color: #15803d;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.9rem 1.2rem;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 8px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .login-branding { display: none; }
            .login-form-panel { width: 100%; }
        }
    </style>
</head>
<body class="login-page">

    <!-- Left Branding Panel -->
    <div class="login-branding">
        <div class="brand-content">
            <div class="brand-logo-ring">
                <i class="fas fa-chart-line"></i>
            </div>
            <h1 class="brand-title">إدارة البحوث<br>والدراسات في السوق</h1>
            <p class="brand-subtitle">YCOMD</p>

            <div class="brand-features">
                <div class="brand-feature-item">
                    <i class="fas fa-file-chart-line"></i>
                    <span>تقارير Platts العالمية اليومية</span>
                </div>
                <div class="brand-feature-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>حماية كاملة بتشفير SSL 256-بت</span>
                </div>
                <div class="brand-feature-item">
                    <i class="fas fa-database"></i>
                    <span>قاعدة بيانات السوق المتكاملة</span>
                </div>
                <div class="brand-feature-item">
                    <i class="fas fa-users-cog"></i>
                    <span>إدارة فرق البحث والتحليل</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Form Panel -->
    <div class="login-form-panel">
        <div class="form-logo">
            <i class="fas fa-user-shield"></i>
        </div>
        <h2 class="form-header-title">مرحباً بك</h2>
        <p class="form-header-sub">سجّل دخولك للوصول إلى النظام</p>

        <div class="error-msg" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i>
            <span>اسم المستخدم أو كلمة المرور غير صحيحة</span>
        </div>

        <form class="login-form" action="/login" method="POST" id="loginForm">
            <div class="field-group">
                <label class="field-label" for="username">
                    <i class="fas fa-user"></i> اسم المستخدم
                </label>
                <div class="field-input-wrapper">
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="field-input"
                        placeholder="أدخل اسم المستخدم"
                        required
                        autocomplete="username"
                    >
                </div>
            </div>

            <div class="field-group">
                <label class="field-label" for="password">
                    <i class="fas fa-key"></i> كلمة المرور
                </label>
                <div class="field-input-wrapper">
                    <input
                        type="text"
                        id="password"
                        name="admin_pass"
                        class="field-input"
                        placeholder="أدخل كلمة المرور"
                        required
                        autocomplete="off"
                        style="padding-left: 3rem; -webkit-text-security: disc;"
                    >
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility()" id="toggleBtn">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i>
                دخول آمن إلى النظام
            </button>
        </form>

        <div class="login-security-badge">
            <i class="fas fa-lock"></i>
            اتصال مشفر وآمن بالكامل
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.style.webkitTextSecurity === 'disc') {
                input.style.webkitTextSecurity = 'none';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.style.webkitTextSecurity = 'disc';
                icon.className = 'fas fa-eye';
            }
        }

        // Restore saved username from localStorage
        const savedUser = localStorage.getItem('lastUsername');
        if (savedUser) {
            document.getElementById('username').value = savedUser;
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value;
            if (username) {
                localStorage.setItem('lastUsername', username);
            }
        });
    </script>
</body>
</html>
