<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | إدارة البحوث والدراسات</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box animate-up">
            <div class="login-header">
                <h2>إدارة البحوث والدراسات في السوق</h2>
                <p>يرجى تسجيل الدخول للمتابعة</p>
            </div>
            <form action="/login" method="POST">
                <div class="input-group">
                    <label for="username">اسم المستخدم</label>
                    <input type="text" id="username" name="username" required placeholder="أدخل اسم المستخدم">
                </div>
                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" required placeholder="أدخل كلمة المرور">
                </div>
                <button type="submit" class="btn-primary">دخول آمن</button>
            </form>
            <div class="login-footer">
                <p>جميع البيانات مشفرة ومحمية &copy; 2026</p>
            </div>
        </div>
    </div>
</body>
</html>
